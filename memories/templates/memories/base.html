<!DOCTYPE html>
<html lang="es">
{% load static %}
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Memories{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="icon" href="https://ailectus.com/imagenes/ic.png" />
    <style>

body {
    min-height: 100vh;
    background: #0b0f1a;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

/* 🌌 fondo elegante */
.bg-overlay {
    position: fixed;
    inset: 0;
    background:
        linear-gradient(to bottom,
            rgba(15, 23, 42, 0.6),
            rgba(15, 23, 42, 0.5),
            rgba(15, 23, 42, 0.8)),
        url("https://ailectus.com/imagenes/fondoy.jpg") center/cover no-repeat;
    z-index: -1;
}

/* 💎 CARD DARK GLASS */
.card-soft {
    background: rgba(15, 23, 42, 0.20);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);

    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.1);

    box-shadow: 0 10px 40px rgba(0,0,0,0.5);

    color: white;
    transition: 0.3s;
}

.card-soft:hover {
    transform: translateY(-3px);
}

/* 🔘 BOTÓN PRINCIPAL */
.btn-primary {
    background: linear-gradient(135deg, #6366f1, #9333ea);
    border: none;
    border-radius: 15px;
    color: white;
    font-weight: 500;
    letter-spacing: 0.3px;
    padding: 10px 18px;
}

.btn-primary:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(147,51,234,0.6);
}

/* 🔘 BOTÓN ACTIVO (reemplazo btn-dark) */
.btn-dark {
    background: linear-gradient(135deg, #6366f1, #9333ea) !important;
    border: none !important;
    color: white !important;
    border-radius: 15px;
}

/* 🔘 BOTÓN SECUNDARIO */
.btn-outline-dark {
    border: 1px solid rgba(255,255,255,0.25);
    color: white;
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
}

.btn-outline-dark:hover {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.5);
}

/* 🔘 BOTONES GENERALES */
.btn {
    transition: all 0.25s ease;
}

/* 🏷 CHIPS (Instagram style limpio) */
.chip {
    border-radius: 15px;
    padding: 6px 12px;
    font-size: 0.85rem;
    border: none; /* 🔥 importante: elimina conflicto */
    background: transparent; /* 🔥 evita doble fondo */
}

/* 🖼 GALERÍA */
.masonry {
    column-count: 2;
    column-gap: 15px;
}

@media (min-width: 768px) {
    .masonry {
        column-count: 4;
    }
}

.masonry-item {
    break-inside: avoid;
    margin-bottom: 15px;
}

/* 📸 IMÁGENES */
.masonry img {
    width: 100%;
    border-radius: 16px;
    display: block;
    transition: 0.3s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.masonry img:hover {
    transform: scale(1.04);
}

/* 🧾 FOOTER */
.footer-dev {
    position: fixed;
    bottom: 10px;
    left: 0;
    width: 100%;

    font-size: 0.8rem;
    color: rgba(255,255,255,0.6);

    letter-spacing: 0.5px;
    pointer-events: none;
}

/* ✨ TRANSICIÓN GLOBAL (más ligera) */
* {
    transition: all 0.2s ease;
}

    </style>
</head>

<body>
    <div class="bg-overlay"></div>
    <main class="container py-4 position-relative">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_script %}{% endblock %}
</body>
<footer class="footer-dev text-center">
    <span>Desarrollado por</span>
    <strong>AILECTUS</strong>
</footer>

</html>
