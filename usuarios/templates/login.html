{% extends "memories/base.html" %}

{% block content %}
<div class="row justify-content-center" style="align-items: center; display: flex; justify-content: center; height: 93vh;">
    <div class="col-lg-5">
        <div class="card card-soft p-4" style="background-color: #ffffff99;">
            <h2 class="mb-3 text-center">Iniciar sesión</h2>

            <form method="post">
                {% csrf_token %}

                <!-- ✅ Esto es lo que faltaba -->
                <input type="hidden" name="next" value="{{ next }}">

                <div class="mb-3">
                    <label for="username" class="form-label">Usuario</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>

                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}

                <button type="submit" class="btn btn-primary w-100">Iniciar sesión</button>

                {% if next %}
                <a href="{{ next }}" class="btn btn-outline-dark w-100 mt-2">Volver</a>
                {% endif %}
            </form>
        </div>
    </div>
</div>
{% endblock %}
